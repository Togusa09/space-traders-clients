name: Unity Build and Test

on:
  push:
    paths:
      - "clients/unity/**"
      - ".github/workflows/unity-build.yml"
  pull_request:
    paths:
      - "clients/unity/**"
      - ".github/workflows/unity-build.yml"
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write

concurrency:
  group: unity-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Edit Mode Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: clients/unity/Library
          key: Library-${{ runner.os }}-tests-${{ hashFiles('clients/unity/Assets/**', 'clients/unity/Packages/**', 'clients/unity/ProjectSettings/**') }}
          restore-keys: |
            Library-${{ runner.os }}-tests-

      - name: Run Edit Mode tests
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: clients/unity
          testMode: editmode
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          artifactsPath: test-results

      - name: Upload test result artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unity-test-results
          path: test-results
          if-no-files-found: warn
          retention-days: 14

  build:
    name: Build ${{ matrix.targetPlatform }}
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        targetPlatform:
          - StandaloneWindows64
          - StandaloneLinux64
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: clients/unity/Library
          key: Library-${{ runner.os }}-${{ matrix.targetPlatform }}-${{ hashFiles('clients/unity/Assets/**', 'clients/unity/Packages/**', 'clients/unity/ProjectSettings/**') }}
          restore-keys: |
            Library-${{ runner.os }}-${{ matrix.targetPlatform }}-

      - name: Build Unity project
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: clients/unity
          targetPlatform: ${{ matrix.targetPlatform }}

      - name: Upload player build artifact
        uses: actions/upload-artifact@v4
        with:
          name: unity-player-${{ matrix.targetPlatform }}
          path: build/${{ matrix.targetPlatform }}
          if-no-files-found: error
          retention-days: 14
